<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>NG Flow</title>
<style>
:root {
  --bg: #0b0f17; --bg-card: #131a26; --bg-card-2: #1a2333;
  --border: #233042; --text: #e6ecf3; --text-dim: #8a99ad; --text-muted: #5d6b7e;
  --accent: #6ea8ff; --accent-2: #94c0ff;
  --green: #4ade80; --red: #f87171; --orange: #fb923c; --yellow: #fbbf24;
  --section-sales: #4ade80; --section-var: #facc15;
  --section-fix: #fb923c; --section-fin: #f87171; --section-summary: #94c0ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, "Hiragino Sans", "Helvetica Neue", Arial, sans-serif;
  font-feature-settings: "tnum" 1, "palt" 1;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
body { padding: 20px 16px 80px; max-width: 1400px; margin: 0 auto; }

/* Lock screen */
#lock { position: fixed; inset: 0; background: radial-gradient(ellipse at center, #131a26 0%, #0b0f17 70%);
  display: flex; align-items: center; justify-content: center; z-index: 100; }
.lock-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
  padding: 48px 40px; width: 100%; max-width: 420px; text-align: center;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5); }
.lock-icon { font-size: 48px; margin-bottom: 16px; background: linear-gradient(180deg, var(--accent), var(--accent-2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.lock-title { font-size: 20px; font-weight: 700; letter-spacing: 0.04em; margin-bottom: 8px; }
.lock-sub { color: var(--text-dim); font-size: 13px; margin-bottom: 28px; }
.lock-card input { width: 100%; padding: 14px 16px; background: var(--bg-card-2);
  border: 1px solid var(--border); color: var(--text); font-size: 16px;
  border-radius: 10px; font-family: "SF Mono", monospace; letter-spacing: 0.05em; outline: none; }
.lock-card input:focus { border-color: var(--accent); }
.lock-card button { margin-top: 16px; width: 100%; padding: 14px;
  background: linear-gradient(180deg, var(--accent), #4f8eff); color: white;
  border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
.lock-error { color: var(--red); font-size: 13px; margin-top: 12px; min-height: 18px; opacity: 0; transition: opacity 0.2s; }
.lock-error.show { opacity: 1; }

/* Dashboard */
#dashboard { display: none; }
#dashboard.ready { display: block; animation: fadeIn 0.4s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.topbar { display: flex; justify-content: space-between; align-items: flex-end;
  border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.topbar h1 { font-size: 22px; font-weight: 700; }
.topbar .subtitle { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
.topbar .actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.btn { background: var(--bg-card-2); border: 1px solid var(--border); color: var(--text);
  padding: 8px 14px; border-radius: 8px; font-size: 12px; cursor: pointer;
  font-family: inherit; transition: background 0.15s; }
.btn:hover { background: var(--border); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
.btn.primary:hover { background: #5a96e8; }
.btn.warn { background: rgba(251,146,60,0.15); border-color: var(--orange); color: var(--orange); }
.btn.danger { background: rgba(248,113,113,0.15); border-color: var(--red); color: var(--red); }
.btn.active { background: var(--green); border-color: var(--green); color: #0b0f17; font-weight: 700; }
.sync-status { font-size: 11px; color: var(--text-muted); }
.sync-status.dirty { color: var(--orange); }
.sync-status.syncing { color: var(--accent); }
.sync-status.synced { color: var(--green); }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.tab { padding: 10px 16px; cursor: pointer; color: var(--text-dim); font-size: 13px;
  border-bottom: 2px solid transparent; transition: all 0.15s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent-2); border-bottom-color: var(--accent); font-weight: 600; }

.panel { display: none; }
.panel.active { display: block; }

/* KPI */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 24px; }
.kpi-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
.kpi-label { font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
.kpi-value { font-size: 20px; font-weight: 700; font-family: "SF Mono", monospace; }
.kpi-value.positive { color: var(--green); }
.kpi-value.negative { color: var(--red); }
.kpi-note { font-size: 10px; color: var(--text-muted); margin-top: 4px; font-family: "SF Mono", monospace; }

/* Tables */
.table-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
  overflow: auto; max-width: 100%; }
table { border-collapse: collapse; width: 100%; font-size: 12px; min-width: 800px; }
thead th { background: var(--bg-card-2); color: var(--text-dim); font-weight: 600;
  font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase;
  padding: 8px 6px; text-align: right; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 2; white-space: nowrap; }
thead th.sticky-col { text-align: left; position: sticky; left: 0; z-index: 3;
  background: var(--bg-card-2); min-width: 180px; }
thead th.col-apr { color: var(--text-muted); font-style: italic; }
thead th.col-year { color: var(--accent-2); }
tbody td { padding: 8px 6px; text-align: right; font-family: "SF Mono", monospace;
  white-space: nowrap; border-bottom: 1px solid #1a2333; font-variant-numeric: tabular-nums; }
tbody td.label { text-align: left; font-family: -apple-system, "Hiragino Sans", sans-serif;
  position: sticky; left: 0; background: var(--bg-card); z-index: 1; color: var(--text); }
tbody tr:hover td { background: rgba(110,168,255,0.04); }
tbody tr:hover td.label { background: var(--bg-card-2); }
tbody tr.section-row td { background: var(--bg-card-2); color: var(--text-dim);
  font-weight: 700; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 6px; }
tbody tr.subtotal td { background: rgba(110,168,255,0.06); color: var(--accent-2); font-weight: 700; }
tbody tr.subtotal td.label { background: var(--bg-card-2); }
tbody tr.summary td { background: rgba(148,192,255,0.08); color: var(--text); font-weight: 700; font-size: 13px; }
tbody tr.summary td.label { background: var(--bg-card-2); }
td.muted, td.zero { color: var(--text-muted); }
td.negative { color: var(--red); font-weight: 700; }
td.positive-cash { color: #ffffff; font-weight: 700; }
td.april { color: var(--text-muted); font-style: italic; }
td.year-total { background: rgba(148,192,255,0.04); font-weight: 600; color: var(--accent-2); }
td.ref2025 { color: var(--green); font-style: italic; }
td.prefilled { color: var(--orange); font-weight: 700; }
td.editable { cursor: pointer; position: relative; }
td.editable:hover { background: rgba(110,168,255,0.12) !important; outline: 1px solid var(--accent); }
td.override { color: var(--accent); font-weight: 600; }
td.fixed-val { color: var(--green); }
td.paid { color: var(--text-muted); text-decoration: line-through; opacity: 0.5; }
.paid-btn { position: absolute; top: 2px; right: 2px; width: 16px; height: 16px;
  border-radius: 50%; background: var(--green); color: #0b0f17; border: none;
  font-size: 9px; font-weight: bold; cursor: pointer; display: none;
  line-height: 16px; padding: 0; }
td.editable:hover .paid-btn { display: block; }
td.paid .paid-btn { background: var(--red); display: block; }
tbody tr.total-row td { background: rgba(251,146,60,0.12); color: var(--orange); font-weight: 700; font-size: 13px; }
tbody tr.total-row td.label { background: var(--bg-card-2); }
tbody tr.cash-row td { background: rgba(148,192,255,0.1); font-weight: 700; font-size: 15px; }
tbody tr.cash-row td.label { background: var(--bg-card-2); color: var(--accent-2); }

input.cell-edit { width: 100%; background: var(--bg-card-2); color: var(--text);
  border: 1px solid var(--accent); padding: 4px 6px; border-radius: 4px; text-align: right;
  font-family: "SF Mono", monospace; font-size: 12px; }
input.cell-edit:focus { outline: none; }
select.cell-edit { width: 100%; background: var(--bg-card-2); color: var(--text);
  border: 1px solid var(--accent); padding: 4px 6px; border-radius: 4px; }

.bullet { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
.b-summary { background: var(--section-summary); } .b-sales { background: var(--section-sales); }
.b-var { background: var(--section-var); } .b-fix { background: var(--section-fix); } .b-fin { background: var(--section-fin); }

/* Bank, Projects, Maintenance edit forms */
.section-title { display: flex; align-items: center; justify-content: space-between;
  font-size: 13px; font-weight: 600; color: var(--text-dim); margin: 20px 0 10px;
  letter-spacing: 0.04em; }
.section-title .left { display: flex; align-items: center; gap: 10px; }
.section-title .left::before { content: ""; display: block; width: 3px; height: 14px;
  background: currentColor; border-radius: 2px; }

td.edit-text-cell, td.edit-num-cell { padding: 4px; }
td.edit-text-cell input, td.edit-num-cell input {
  width: 100%; background: transparent; color: var(--text); border: none;
  padding: 4px 6px; font-family: inherit; font-size: 12px;
}
td.edit-num-cell input { font-family: "SF Mono", monospace; text-align: right; }
td.edit-text-cell input:focus, td.edit-num-cell input:focus {
  background: var(--bg-card-2); outline: 1px solid var(--accent); border-radius: 4px;
}

.add-btn { margin-top: 8px; padding: 6px 12px; background: rgba(110,168,255,0.1);
  border: 1px dashed var(--accent); color: var(--accent); border-radius: 6px;
  cursor: pointer; font-size: 11px; font-family: inherit; }
.add-btn:hover { background: rgba(110,168,255,0.2); }

.del-btn { background: rgba(248,113,113,0.1); border: 1px solid var(--red);
  color: var(--red); border-radius: 4px; padding: 2px 6px; cursor: pointer; font-size: 10px;
  font-family: inherit; }

/* Maintenance route selector */
.route-sel { background: var(--bg-card-2); border: 1px solid var(--border);
  color: var(--text); padding: 3px 6px; border-radius: 4px; font-size: 11px;
  font-family: inherit; min-width: 80px; }
.route-sel.set { border-color: var(--green); color: var(--green); }

/* Maintenance route summary */
.maint-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 8px; margin: 10px 0 20px; }
.maint-route-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
.maint-route-title { font-size: 11px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
.maint-route-amount { font-size: 18px; font-weight: 700; font-family: "SF Mono", monospace; color: var(--green); }
.maint-route-count { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

.footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--border);
  font-size: 10px; color: var(--text-muted); text-align: center; }

@media (max-width: 768px) {
  body { padding: 12px 8px 60px; }
  .topbar { flex-direction: column; align-items: flex-start; }
  .topbar h1 { font-size: 18px; }
  table { font-size: 11px; min-width: 700px; }
  thead th.sticky-col { min-width: 140px; }
  .kpi-value { font-size: 18px; }
}
</style>
</head>
<body>

<!-- Lock Screen -->
<div id="lock">
  <div class="lock-card">
    <div class="lock-icon">⛬</div>
    <div class="lock-title">NG FLOW</div>
    <div class="lock-sub">パスワードを入力してください</div>
    <form id="lockForm" autocomplete="off">
      <input type="password" id="passInput" placeholder="••••••••••••••••" autofocus required>
      <button type="submit">ロック解除</button>
    </form>
    <div class="lock-error" id="lockError">パスワードが違います</div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="topbar">
    <div>
      <h1 id="title">NG Flow</h1>
      <div class="subtitle" id="subtitle"></div>
    </div>
    <div class="actions">
      <button class="btn" id="btnEdit">✏ 編集モード</button>
      <button class="btn" id="btnPull">⬇ クラウド読込</button>
      <button class="btn primary" id="btnPush">⬆ クラウド保存</button>
      <span class="sync-status" id="syncStatus">未同期</span>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-panel="summary">サマリー</div>
    <div class="tab" data-panel="main">メイン明細</div>
    <div class="tab" data-panel="banks">銀行残高</div>
    <div class="tab" data-panel="projects">進行案件</div>
    <div class="tab" data-panel="maint">保守管理（120件）</div>
  </div>

  <!-- Summary -->
  <div class="panel active" id="panel-summary">
    <div class="kpi-grid" id="kpiGrid"></div>
    <div class="section-title"><span class="left">📊 保守管理 経路別</span></div>
    <div class="maint-grid" id="maintGrid"></div>
  </div>

  <!-- Main detail -->
  <div class="panel" id="panel-main">
    <div class="section-title">
      <span class="left">📋 項目別月次明細</span>
      <span style="font-size:10px; color:var(--text-muted);">編集モードで青字セルをクリック</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr id="mainThead"></tr></thead>
        <tbody id="mainTbody"></tbody>
      </table>
    </div>
    <button class="add-btn" id="addExtra" style="display:none;">＋ 臨時出金行を追加</button>
  </div>

  <!-- Banks -->
  <div class="panel" id="panel-banks">
    <div class="section-title">
      <span class="left">🏦 銀行残高（口座別 × 月初・月末）</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr id="banksThead"></tr></thead>
        <tbody id="banksTbody"></tbody>
      </table>
    </div>
    <button class="add-btn" id="addBank" style="display:none;">＋ 口座を追加</button>
  </div>

  <!-- Projects -->
  <div class="panel" id="panel-projects">
    <div class="section-title">
      <span class="left">📦 進行案件（納品・入金予定）</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr id="projThead"></tr></thead>
        <tbody id="projTbody"></tbody>
      </table>
    </div>
    <button class="add-btn" id="addProj" style="display:none;">＋ 案件を追加</button>
  </div>

  <!-- Maintenance -->
  <div class="panel" id="panel-maint">
    <div class="section-title">
      <span class="left">💼 保守管理入金（経路・期間の振り分け）</span>
      <span style="font-size:10px; color:var(--text-muted);" id="maintProgress"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr id="maintThead"></tr></thead>
        <tbody id="maintTbody"></tbody>
      </table>
    </div>
    <button class="add-btn" id="addMaint" style="display:none;">＋ 保守管理契約を追加</button>
  </div>

  <div class="footer">
    <div>編集はlocalStorageに自動保存。「クラウド保存」でGitHub経由で全デバイス同期されます</div>
  </div>
</div>

let STATE = { password: "", pat: "", data: null, dirty: false, lastSync: null };
const LS_KEY = "ng-flow-data";

function b64dec(s){ const b=atob(s); const a=new Uint8Array(b.length); for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i); return a; }
function b64enc(u){ let s=""; for(let i=0;i<u.length;i++) s+=String.fromCharCode(u[i]); return btoa(s); }

async function deriveKey(pw, salt, iters){
  const base = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), {name:"PBKDF2"}, false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt, iterations:iters, hash:"SHA-256"},
    base, {name:"AES-GCM", length:256}, false, ["encrypt","decrypt"]);
}
async function decrypt(payload, pw){
  const salt = b64dec(payload.salt); const iv = b64dec(payload.iv); const ct = b64dec(payload.ciphertext);
  const key = await deriveKey(pw, salt, payload.iterations);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv}, key, ct);
  return JSON.parse(new TextDecoder().decode(pt));
}
async function encrypt(plaintext, pw){
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(pw, salt, INIT.iterations);
  const ct = await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, new TextEncoder().encode(JSON.stringify(plaintext)));
  return { salt: b64enc(salt), iv: b64enc(iv), ciphertext: b64enc(new Uint8Array(ct)), iterations: INIT.iterations };
}

// =========================================================
const lock = document.getElementById("lock");
const lockForm = document.getElementById("lockForm");
const passInput = document.getElementById("passInput");
const lockError = document.getElementById("lockError");
const dashboard = document.getElementById("dashboard");

lockForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  lockError.classList.remove("show");
  try {
    const secret = await decrypt(INIT, passInput.value);
    STATE.password = passInput.value;
    STATE.pat = secret.pat;
    // localStorage に保存されている編集後データがあれば優先
    const ls = localStorage.getItem(LS_KEY);
    if (ls) {
      try { STATE.data = JSON.parse(ls); STATE.dirty = true; }
      catch(e) { STATE.data = secret.data; }
    } else {
      STATE.data = secret.data;
    }
    lock.style.display = "none";
    dashboard.classList.add("ready");
    render();
    updateSyncStatus();
  } catch (err) {
    lockError.classList.add("show");
    passInput.value = ""; passInput.focus();
  }
});

function fmt(v){ if(v==null||v===0) return "—"; if(v<0) return "(¥"+Math.abs(v).toLocaleString()+")"; return "¥"+v.toLocaleString(); }
function fmtSigned(v){ if(v==null) return "—"; if(v===0) return "¥0"; const s=v<0?"−":""; return s+"¥"+Math.abs(v).toLocaleString(); }

// 保守管理経路別に月別収入を計算
function computeMaintMonthly(monthIdx){
  const monthNum = STATE.data.monthNums[monthIdx];
  const routes = STATE.data.routes || ["K-NET","銀行","カード","現金"];
  const result = { "未設定": 0 };
  routes.forEach(r => result[r] = 0);
  STATE.data.maintenance.forEach(m => {
    if (monthIdx === 0) return;
    const start = m.startMonth, end = m.endMonth;
    if (start != null && monthNum < start) return;
    if (end != null && monthNum > end) return;
    const route = m.route || "未設定";
    result[route] = (result[route] || 0) + m.monthly;
  });
  return result;
}

// 進行案件から月別入金を集計
function computeProjectsMonthly(monthIdx){
  // monthIdx 0=4月...
  const monthName = STATE.data.months[monthIdx]; // "4月"
  let total = 0;
  STATE.data.projects.forEach(p => {
    [["advance_amount","advance_month"],["middle_amount","middle_month"],["final_amount","final_month"]].forEach(([a,m])=>{
      const amt = p[a]; const mon = p[m];
      if (amt && mon && (mon === monthName || String(mon).includes(monthName))) total += amt;
    });
  });
  return total;
}

// セル値を取得（優先順位: paid=0 > overrides > prefilledOverrides > linked > fixedValues > 初期値）
function getCellValue(item, monthIdx){
  if (monthIdx === 0) return 0;
  // 支払済セルは計算上0扱い
  if (isPaid(item, monthIdx)) return 0;
  const ov = STATE.data.overrides?.[item]?.[monthIdx];
  if (ov != null) return ov;
  const pre = STATE.data.prefilledOverrides?.[item]?.[monthIdx];
  if (pre != null) return pre;
  if (item === "定期（銀行）") return computeMaintMonthly(monthIdx)["銀行"];
  if (item === "定期（K-NET）") return computeMaintMonthly(monthIdx)["K-NET"];
  if (item === "定期（カード）") return computeMaintMonthly(monthIdx)["カード"];
  if (item === "定期（現金）") return computeMaintMonthly(monthIdx)["現金"];
  const fixed = STATE.data.fixedValues?.[item];
  if (fixed != null) return fixed;
  return null;
}
// 表示用セル値（支払済でも元値を見せる）
function getDisplayValue(item, monthIdx){
  if (monthIdx === 0) return 0;
  const ov = STATE.data.overrides?.[item]?.[monthIdx];
  if (ov != null) return ov;
  const pre = STATE.data.prefilledOverrides?.[item]?.[monthIdx];
  if (pre != null) return pre;
  if (item === "定期（銀行）") return computeMaintMonthly(monthIdx)["銀行"];
  if (item === "定期（K-NET）") return computeMaintMonthly(monthIdx)["K-NET"];
  if (item === "定期（カード）") return computeMaintMonthly(monthIdx)["カード"];
  if (item === "定期（現金）") return computeMaintMonthly(monthIdx)["現金"];
  const fixed = STATE.data.fixedValues?.[item];
  if (fixed != null) return fixed;
  return null;
}

function isEditable(item){
  // 合計行・linked売上行は編集不可（月初現金残高の4月のみ別途編集可）
  if (["月末現金残高（予測）","売上合計","変動費合計","固定費合計","財務支出合計","総コスト",
       "定期（銀行）","定期（K-NET）","定期（カード）","定期（現金）"].includes(item)) return false;
  return true;
}

function isPaid(item, monthIdx){
  return STATE.data.paidCells?.[item]?.[monthIdx] === true;
}
function setPaid(item, monthIdx, paid){
  STATE.data.paidCells ||= {};
  STATE.data.paidCells[item] ||= {};
  if (paid) STATE.data.paidCells[item][monthIdx] = true;
  else delete STATE.data.paidCells[item][monthIdx];
}

function getCellSource(item, monthIdx){
  // セルの値の出どころを返す: "override" / "prefilled" / "fixed" / "linked" / "blank"
  if (monthIdx === 0) return "april";
  if (STATE.data.overrides?.[item]?.[monthIdx] != null) return "override";
  if (STATE.data.prefilledOverrides?.[item]?.[monthIdx] != null) return "prefilled";
  if (["定期（銀行）","定期（K-NET）","定期（カード）"].includes(item)) return "linked";
  if (STATE.data.fixedValues?.[item] != null) return "fixed";
  return "blank";
}

// 月次集計
function sumByItems(items, monthIdx){
  let total = 0;
  items.forEach(it => {
    const v = getCellValue(it, monthIdx);
    if (typeof v === "number") total += v;
  });
  return total;
}

// UI側で強制的に使用するsection_order（データ側のsection_orderは無視）
const SECTION_ORDER_UI = [
  ["💰 現金残高", ["月初現金残高"]],
  ["📈 売上", ["売上合計","NOT月定期","定期（銀行）","定期（K-NET）","定期（カード）","定期（現金）","コミッション","Eコマース","補助金還付"]],
  ["📉 総コスト", ["総コスト"]],
  ["固定費", ["固定費合計","給与","賞与","退職金","社会保険","労働保険","家賃",
             "車両保険","倒産防止共済","生命共済(商工会議所)","アクサ生命","社労士",
             "源泉所得税","市県民税","消費税","法人県税","法人市税","車両税"]],
  ["変動費", ["変動費合計","外注費"]],
  ["財務", ["財務支出合計","政策金融公庫1","政策金融公庫2","相互信用金庫","MFビジネスカード","UCカード","楽天カード",
            "PayPayカードローン","みずほローン","AUカードローン"]],
];
const salesItems = ["NOT月定期","定期（銀行）","定期（K-NET）","定期（カード）","定期（現金）","コミッション","Eコマース","補助金還付"];
const varItems = ["外注費"];
const fixItems = ["給与","賞与","退職金","社会保険","労働保険","家賃","車両保険","倒産防止共済","生命共済(商工会議所)","アクサ生命","社労士","源泉所得税","市県民税","消費税","法人県税","法人市税","車両税"];
const finItems = ["政策金融公庫1","政策金融公庫2","相互信用金庫","MFビジネスカード","UCカード","楽天カード","PayPayカードローン","みずほローン","AUカードローン"];

function computeMonthlyKPI(){
  // 各月: 月初現金残高 / 売上合計 / 総コスト
  // 「現在の現金残高」= openingApril (社長手動入力 = 4月の月初残高)
  // 各月の月初現金残高 = 前月月初 + 前月売上合計 - 前月総コスト
  const result = [];
  let opening = STATE.data.openingApril;
  for (let m = 0; m < 12; m++){
    const sales = sumByItems(salesItems, m);
    const vc = sumByItems(varItems, m);
    const fc = sumByItems(fixItems, m);
    const fin = sumByItems(finItems, m);
    const extra = (STATE.data.extraExpenses || []).reduce((s, e) => {
      if (isPaid("_extra_"+e.name, m)) return s;
      return s + (e.values[m] || 0);
    }, 0);
    const totalCost = vc + fc + fin + extra;
    result.push({ month: STATE.data.months[m], opening, sales, vc, fc, fin, extra, totalCost });
    // 次月の月初残高
    opening = opening + sales - totalCost;
  }
  return result;
}

function render(){
  document.getElementById("title").textContent = STATE.data.title;
  document.getElementById("subtitle").textContent = STATE.data.subtitle;
  renderKPI();
  renderMaintGrid();
  renderMain();
  renderBanks();
  renderProjects();
  renderMaint();
}

function renderKPI(){
  const kpi = computeMonthlyKPI();
  const grid = document.getElementById("kpiGrid");
  grid.innerHTML = "";
  kpi.forEach((k, i) => {
    // 当月の予測残高 = 月初残高 + 売上合計 - 総コスト
    const projected = k.opening + k.sales - k.totalCost;
    const card = document.createElement("div");
    card.className = "kpi-card";
    const cls = projected > 0 ? "positive" : "negative";
    card.innerHTML = `
      <div class="kpi-label">${k.month} 月末予測</div>
      <div class="kpi-value ${cls}">${fmtSigned(projected)}</div>
      <div class="kpi-note">月初 ${fmtSigned(k.opening)} ＋売上 ${fmt(k.sales)} −コスト ${fmt(k.totalCost)}</div>
    `;
    grid.appendChild(card);
  });
}

function renderMaintGrid(){
  const grid = document.getElementById("maintGrid");
  grid.innerHTML = "";
  const routes = { "K-NET": [], "銀行": [], "カード": [], "未設定": [] };
  STATE.data.maintenance.forEach(m => {
    const r = m.route || "未設定";
    if (routes[r]) routes[r].push(m); else routes["未設定"].push(m);
  });
  Object.entries(routes).forEach(([route, list]) => {
    const total = list.reduce((s, m) => s + m.monthly, 0);
    const card = document.createElement("div");
    card.className = "maint-route-card";
    card.innerHTML = `<div class="maint-route-title">${route}</div>
      <div class="maint-route-amount">${fmt(total)}/月</div>
      <div class="maint-route-count">${list.length}件 / 年計 ${fmt(total * 11)}</div>`;
    grid.appendChild(card);
  });
}

function renderMain(){
  const thead = document.getElementById("mainThead");
  thead.innerHTML = `<th class="sticky-col">項目</th>` +
    STATE.data.months.map((m,i) => `<th class="${i===0?'col-apr':''}">${m}</th>`).join("") +
    `<th class="col-year">年計</th><th>2025参考</th>`;

  const tbody = document.getElementById("mainTbody");
  tbody.innerHTML = "";

  const subtotalSet = new Set(["売上合計","変動費合計","固定費合計","財務支出合計"]);
  const totalSet = new Set(["総コスト"]);
  const cashSet = new Set(["月初現金残高"]);

  const kpi = computeMonthlyKPI();

  SECTION_ORDER_UI.forEach(([sec, items]) => {
    const headerTr = document.createElement("tr");
    headerTr.className = "section-row";
    headerTr.innerHTML = `<td colspan="${STATE.data.months.length + 3}">${sec}</td>`;
    tbody.appendChild(headerTr);

    items.forEach(it => {
      const tr = document.createElement("tr");
      if (subtotalSet.has(it)) tr.className = "subtotal";
      if (totalSet.has(it)) tr.className = "total-row";
      if (cashSet.has(it)) tr.className = "cash-row";

      const cells = [`<td class="label">${it}</td>`];
      let yearly = 0;

      for (let m = 0; m < 12; m++){
        let val;
        let isComputed = false;
        if (it === "月初現金残高") { val = kpi[m].opening; isComputed = true; }
        else if (it === "売上合計") { val = kpi[m].sales; isComputed = true; }
        else if (it === "変動費合計") { val = kpi[m].vc; isComputed = true; }
        else if (it === "固定費合計") { val = kpi[m].fc; isComputed = true; }
        else if (it === "財務支出合計") { val = kpi[m].fin; isComputed = true; }
        else if (it === "総コスト") { val = kpi[m].totalCost; isComputed = true; }
        else val = getDisplayValue(it, m);

        const source = getCellSource(it, m);
        let cls = "";
        if (m === 0) cls += " april";
        if (val == null || val === 0) cls += " zero";
        if (val != null && val < 0) cls += " negative";
        if (it === "月初現金残高" && m > 0) {
          cls = val > 0 ? " positive-cash" : (val < 0 ? " negative" : " zero");
        }
        if (it === "月初現金残高" && m === 0) cls = " positive-cash";  // 4月の現在残高
        if (source === "prefilled") cls += " prefilled";
        if (source === "override") cls += " override";
        if (source === "fixed") cls += " fixed-val";
        if (isPaid(it, m)) cls += " paid";
        const editable = STATE.editMode && (
          (it === "月初現金残高" && m === 0) || // 4月の月初は手動入力
          (isEditable(it) && !isComputed && m > 0)
        );
        if (editable) cls += " editable";
        if (typeof val === "number" && !isComputed) yearly += val;

        let cellContent = fmt(val);
        if (editable && val !== null && val !== 0 && it !== "月初現金残高") {
          cellContent += `<button class="paid-btn" data-paid-item="${it}" data-paid-month="${m}" title="${isPaid(it,m)?'未払いに戻す':'支払済としてマーク'}">${isPaid(it,m)?'↺':'✓'}</button>`;
        }
        cells.push(`<td class="${cls.trim()}" data-item="${it}" data-month="${m}">${cellContent}</td>`);
      }

      const ycStr = isComputedRow(it) ? "" : fmt(yearly);
      cells.push(`<td class="year-total">${ycStr}</td>`);
      const rowDef = STATE.data.mainRows.find(r => r.item === it);
      cells.push(`<td class="ref2025">${rowDef?.ref2025 ? fmt(rowDef.ref2025) : "—"}</td>`);

      tr.innerHTML = cells.join("");
      tbody.appendChild(tr);
    });
  });

  // 臨時出金
  if (STATE.data.extraExpenses && STATE.data.extraExpenses.length > 0) {
    const headerTr = document.createElement("tr");
    headerTr.className = "section-row";
    headerTr.innerHTML = `<td colspan="${STATE.data.months.length + 3}">⚡ 臨時出金</td>`;
    tbody.appendChild(headerTr);
    STATE.data.extraExpenses.forEach((e, idx) => {
      const tr = document.createElement("tr");
      const cells = [];
      if (STATE.editMode) {
        cells.push(`<td class="label edit-text-cell"><input data-extra="${idx}" data-field="name" value="${e.name || ''}" placeholder="名称（例：機材購入）"><button class="del-btn" data-del-extra="${idx}">×</button></td>`);
      } else {
        cells.push(`<td class="label">${e.name || "(無題)"}</td>`);
      }
      let yearly = 0;
      for (let m = 0; m < 12; m++) {
        const v = e.values[m];
        let cls = "";
        if (m === 0) cls += " april";
        if (v == null || v === 0) cls += " zero";
        if (STATE.editMode && m > 0) cls += " editable";
        const paidKey = "_extra_" + (e.name || "");
        if (isPaid(paidKey, m)) cls += " paid";
        if (typeof v === "number" && !isPaid(paidKey, m)) yearly += v;
        let cellContent = fmt(v);
        if (STATE.editMode && v && m > 0) {
          cellContent += `<button class="paid-btn" data-paid-item="${paidKey}" data-paid-month="${m}">${isPaid(paidKey,m)?'↺':'✓'}</button>`;
        }
        cells.push(`<td class="${cls.trim()}" data-extra="${idx}" data-month="${m}">${cellContent}</td>`);
      }
      cells.push(`<td class="year-total">${fmt(yearly)}</td><td class="ref2025">—</td>`);
      tr.innerHTML = cells.join("");
      tbody.appendChild(tr);
    });
  }

  attachMainEditHandlers();
}
function isComputedRow(it){
  return ["月初現金残高","売上合計","変動費合計","固定費合計","財務支出合計","総コスト"].includes(it);
}

function attachMainEditHandlers(){
  if (!STATE.editMode) return;
  // 支払済ボタン
  document.querySelectorAll('#mainTbody .paid-btn').forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const item = btn.dataset.paidItem;
      const monthIdx = parseInt(btn.dataset.paidMonth);
      setPaid(item, monthIdx, !isPaid(item, monthIdx));
      markDirty();
      renderKPI(); renderMain();
    });
  });
  // セル編集
  document.querySelectorAll('#mainTbody td.editable').forEach(td => {
    td.addEventListener("click", (e) => {
      if (e.target.classList.contains('paid-btn')) return;
      const item = td.dataset.item;
      const monthIdx = parseInt(td.dataset.month);
      const extraIdx = td.dataset.extra;
      let current;
      if (item === "月初現金残高" && monthIdx === 0) {
        current = STATE.data.openingApril;
      } else if (extraIdx != null) {
        current = STATE.data.extraExpenses[extraIdx].values[monthIdx];
      } else {
        current = getDisplayValue(item, monthIdx);
      }
      const inp = document.createElement("input");
      inp.type = "number"; inp.className = "cell-edit";
      inp.value = current ?? "";
      td.innerHTML = ""; td.appendChild(inp); inp.focus(); inp.select();
      const commit = () => {
        const v = inp.value === "" ? null : parseFloat(inp.value);
        if (item === "月初現金残高" && monthIdx === 0) {
          STATE.data.openingApril = v ?? 0;
        } else if (extraIdx != null) {
          STATE.data.extraExpenses[extraIdx].values[monthIdx] = v;
        } else {
          STATE.data.overrides ||= {};
          STATE.data.overrides[item] ||= {};
          if (v == null) delete STATE.data.overrides[item][monthIdx];
          else STATE.data.overrides[item][monthIdx] = v;
        }
        markDirty();
        renderKPI(); renderMain();
      };
      inp.addEventListener("blur", commit);
      inp.addEventListener("keydown", (e) => {
        if (e.key === "Enter") inp.blur();
        if (e.key === "Escape") renderMain();
      });
    });
  });
  document.querySelectorAll('input[data-extra][data-field="name"]').forEach(inp => {
    inp.addEventListener("change", () => {
      STATE.data.extraExpenses[parseInt(inp.dataset.extra)].name = inp.value;
      markDirty();
    });
  });
  document.querySelectorAll('[data-del-extra]').forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (!confirm("この臨時出金を削除しますか？")) return;
      STATE.data.extraExpenses.splice(parseInt(btn.dataset.delExtra), 1);
      markDirty(); render();
    });
  });
}

        <td><input type="number" min="1" max="12" data-maint="${idx}" data-field="endMonth" value="${m.endMonth??''}" placeholder="--" style="width:60px; background:transparent; color:var(--text); border:1px solid var(--border); padding:3px 6px; border-radius:4px; text-align:center;"></td>

function attachMaintHandlers(){
  if (!STATE.editMode) return;
  document.querySelectorAll('#maintTbody select, #maintTbody input').forEach(el => {
    el.addEventListener("change", () => {
      const idx = parseInt(el.dataset.maint);
      const field = el.dataset.field;
      if (field === "route") {
        STATE.data.maintenance[idx].route = el.value;
      } else {
        const v = el.value === "" ? null : parseInt(el.value);
        STATE.data.maintenance[idx][field] = v;
      }
      markDirty();
      renderKPI(); renderMaintGrid(); renderMaint();
    });
  });
}

// =========================================================
// State management
// =========================================================
function markDirty(){
  STATE.dirty = true;
  localStorage.setItem(LS_KEY, JSON.stringify(STATE.data));
  updateSyncStatus();
}
function updateSyncStatus(){
  const el = document.getElementById("syncStatus");
  el.classList.remove("dirty","syncing","synced");
  if (STATE.syncing) { el.classList.add("syncing"); el.textContent = "同期中..."; }
  else if (STATE.dirty) { el.classList.add("dirty"); el.textContent = "未保存の変更あり"; }
  else if (STATE.lastSync) { el.classList.add("synced"); el.textContent = "同期済み " + STATE.lastSync; }
  else el.textContent = "未同期";
}

// =========================================================
// Tab switching
// =========================================================
document.querySelectorAll(".tab").forEach(t => {
  t.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    document.getElementById("panel-" + t.dataset.panel).classList.add("active");

// =========================================================
// Edit mode toggle
// =========================================================
document.getElementById("btnEdit").addEventListener("click", () => {
  STATE.editMode = !STATE.editMode;
  const btn = document.getElementById("btnEdit");
  if (STATE.editMode) {
    btn.classList.add("active");
    btn.textContent = "✏ 編集中（クリックで終了）";

      const el = document.getElementById(id); if (el) el.style.display = "inline-block";

    btn.classList.remove("active");

document.getElementById("addExtra").addEventListener("click", () => {
  STATE.data.extraExpenses = STATE.data.extraExpenses || [];
  STATE.data.extraExpenses.push({ name: "", values: new Array(12).fill(null) });
  markDirty(); render();
});

document.getElementById("addBank").addEventListener("click", () => {
  STATE.data.banks.push({
    name: "新規口座", bank: "",
    opening: new Array(12).fill(null), closing: new Array(12).fill(null), note: ""
  });
  markDirty(); renderBanks();
});

document.getElementById("addProj").addEventListener("click", () => {
  STATE.data.projects.push({
    name: "新規案件", client: "", amount: 0,
    advance_amount: 0, advance_month: "",
    middle_amount: 0, middle_month: "",
    final_amount: 0, final_month: "",
    status: "見込", owner: "", note: ""
  });
  markDirty(); renderProjects();

document.getElementById("addMaint").addEventListener("click", () => {
  const name = prompt("契約先名を入力してください");
  if (!name) return;
  const monthly = parseFloat(prompt("月額（円）を入力してください", "7000") || "0");
  if (!monthly) return;
  STATE.data.maintenance.unshift({
    name, project: "", monthly,
    route: "", startMonth: null, endMonth: null
  });
  markDirty(); renderMaint(); renderKPI(); renderMaintGrid();
});

// =========================================================
// GitHub sync
// =========================================================
async function gitGetFileSha(){
  const url = `https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.file}`;
  const r = await fetch(url, { headers: { Authorization: `token ${STATE.pat}`, Accept: "application/vnd.github+json" } });
  if (r.status === 404) return null;
  if (!r.ok) throw new Error(`GET ${GH.file}: ${r.status}`);
  const j = await r.json();
  return { sha: j.sha, content: atob(j.content) };
}
async function gitPutFile(content, sha){
  const url = `https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.file}`;
  const body = {
    message: `Update ${GH.file} via NG Flow @ ${new Date().toISOString()}`,
    content: btoa(unescape(encodeURIComponent(content))),
  };
  if (sha) body.sha = sha;
  const r = await fetch(url, { method: "PUT", headers: { Authorization: `token ${STATE.pat}`, Accept: "application/vnd.github+json", "Content-Type": "application/json" }, body: JSON.stringify(body) });
  if (!r.ok) {
    const err = await r.text();
    throw new Error(`PUT ${GH.file}: ${r.status} - ${err}`);
  }
}

document.getElementById("btnPush").addEventListener("click", async () => {
  if (!confirm("現在のデータをクラウドに保存します。よろしいですか？")) return;
  STATE.syncing = true; updateSyncStatus();
  try {
    const enc = await encrypt(STATE.data, STATE.password);
    const existing = await gitGetFileSha();
    await gitPutFile(JSON.stringify(enc), existing?.sha);
    STATE.dirty = false; STATE.lastSync = new Date().toLocaleString("ja-JP");
    localStorage.removeItem(LS_KEY);
    alert("クラウドに保存しました ✓");
  } catch(e) {
    alert("保存に失敗しました：" + e.message);
  } finally {
    STATE.syncing = false; updateSyncStatus();
  }
});

document.getElementById("btnPull").addEventListener("click", async () => {
  if (STATE.dirty && !confirm("未保存の変更があります。クラウドのデータで上書きしますか？")) return;
  STATE.syncing = true; updateSyncStatus();
  try {
    const existing = await gitGetFileSha();
    if (!existing) throw new Error("クラウドにデータがまだありません");
    const enc = JSON.parse(existing.content);
    const data = await decrypt(enc, STATE.password);
    STATE.data = data; STATE.dirty = false;
    STATE.lastSync = new Date().toLocaleString("ja-JP");
    localStorage.removeItem(LS_KEY);
    render();
    alert("クラウドから読み込みました ✓");
  } catch(e) {
    alert("読込に失敗しました：" + e.message);
  } finally {
    STATE.syncing = false; updateSyncStatus();
  }
});
</script>
