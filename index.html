<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>NG Flow — キャッシュフロー</title>
<style>
:root {
  --bg: #0b0f17;
  --bg-card: #131a26;
  --bg-card-2: #1a2333;
  --border: #233042;
  --text: #e6ecf3;
  --text-dim: #8a99ad;
  --text-muted: #5d6b7e;
  --accent: #6ea8ff;
  --accent-2: #94c0ff;
  --green: #4ade80;
  --red: #f87171;
  --orange: #fb923c;
  --yellow: #fbbf24;
  --section-sales: #4ade80;
  --section-var: #facc15;
  --section-fix: #fb923c;
  --section-fin: #f87171;
  --section-summary: #94c0ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, "Hiragino Sans", "Helvetica Neue", Arial, sans-serif;
  font-feature-settings: "tnum" 1, "palt" 1;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
body { padding: 24px 16px; max-width: 1400px; margin: 0 auto; }

/* ===== Lock screen ===== */
#lock {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, #131a26 0%, #0b0f17 70%);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
.lock-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px 40px;
  width: 100%; max-width: 420px;
  text-align: center;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5);
}
.lock-icon {
  font-size: 48px; margin-bottom: 16px;
  background: linear-gradient(180deg, var(--accent), var(--accent-2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.lock-title {
  font-size: 20px; font-weight: 700; letter-spacing: 0.04em;
  margin-bottom: 8px;
}
.lock-sub {
  color: var(--text-dim); font-size: 13px; margin-bottom: 28px;
}
.lock-card input {
  width: 100%; padding: 14px 16px;
  background: var(--bg-card-2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 16px;
  border-radius: 10px;
  font-family: "SF Mono", "Menlo", monospace;
  letter-spacing: 0.05em;
  outline: none;
  transition: border-color 0.15s;
}
.lock-card input:focus { border-color: var(--accent); }
.lock-card button {
  margin-top: 16px;
  width: 100%; padding: 14px;
  background: linear-gradient(180deg, var(--accent) 0%, #4f8eff 100%);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px; font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: transform 0.05s;
}
.lock-card button:hover { transform: translateY(-1px); }
.lock-card button:active { transform: translateY(0); }
.lock-error {
  color: var(--red); font-size: 13px; margin-top: 12px;
  min-height: 18px;
  opacity: 0;
  transition: opacity 0.2s;
}
.lock-error.show { opacity: 1; }

/* ===== Main dashboard ===== */
#dashboard { display: none; }
#dashboard.ready { display: block; animation: fadeIn 0.4s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.header {
  display: flex; justify-content: space-between; align-items: flex-end;
  border-bottom: 1px solid var(--border);
  padding-bottom: 20px; margin-bottom: 28px;
  flex-wrap: wrap; gap: 12px;
}
.header h1 {
  font-size: 24px; font-weight: 700;
  letter-spacing: 0.02em;
}
.header .subtitle {
  font-size: 12px; color: var(--text-dim);
  margin-top: 4px;
}
.header .meta {
  font-size: 11px; color: var(--text-muted);
  text-align: right;
}

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
  margin-bottom: 32px;
}
.kpi-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
}
.kpi-label {
  font-size: 11px; color: var(--text-dim);
  letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 8px;
}
.kpi-value {
  font-size: 24px; font-weight: 700;
  font-family: "SF Mono", "Menlo", monospace;
}
.kpi-value.positive { color: var(--green); }
.kpi-value.negative { color: var(--red); }
.kpi-value.neutral { color: var(--text); }
.kpi-note {
  font-size: 11px; color: var(--text-muted);
  margin-top: 4px;
}

/* ===== Table ===== */
.section-title {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-dim);
  margin: 24px 0 12px;
}
.section-title::before {
  content: ""; display: block;
  width: 3px; height: 14px;
  background: currentColor;
  border-radius: 2px;
}

.table-wrap {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: auto;
  max-width: 100%;
}
table {
  border-collapse: collapse;
  width: 100%;
  font-size: 13px;
  min-width: 1100px;
}
thead th {
  background: var(--bg-card-2);
  color: var(--text-dim);
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 10px 8px;
  text-align: right;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 2;
  white-space: nowrap;
}
thead th.sticky-col {
  text-align: left;
  position: sticky; left: 0; z-index: 3;
  background: var(--bg-card-2);
  min-width: 200px;
}
thead th.col-month-april { color: var(--text-muted); font-style: italic; }
thead th.col-year { color: var(--accent-2); }

tbody td {
  padding: 9px 8px;
  text-align: right;
  font-family: "SF Mono", "Menlo", monospace;
  white-space: nowrap;
  border-bottom: 1px solid #1a2333;
  font-variant-numeric: tabular-nums;
}
tbody td.label {
  text-align: left;
  font-family: -apple-system, "Hiragino Sans", sans-serif;
  position: sticky; left: 0;
  background: var(--bg-card);
  z-index: 1;
  color: var(--text);
}
tbody tr:hover td { background: rgba(110,168,255,0.04); }
tbody tr:hover td.label { background: var(--bg-card-2); }
tbody tr.section-row td {
  background: var(--bg-card-2);
  color: var(--text-dim);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 6px 8px;
}
tbody tr.subtotal td {
  background: rgba(110,168,255,0.06);
  color: var(--accent-2);
  font-weight: 700;
  border-bottom: 1px solid var(--border);
}
tbody tr.subtotal td.label { background: var(--bg-card-2); }

tbody tr.summary td {
  background: rgba(148,192,255,0.08);
  color: var(--text);
  font-weight: 700;
  font-size: 14px;
}
tbody tr.summary td.label { background: var(--bg-card-2); }

td.muted { color: var(--text-muted); }
td.zero { color: var(--text-muted); }
td.negative { color: var(--red); }
td.april { color: var(--text-muted); font-style: italic; }
td.year-total { background: rgba(148,192,255,0.04); font-weight: 600; color: var(--accent-2); }
td.ref2025 { color: var(--green); font-style: italic; }
td.prefilled { color: var(--orange); font-weight: 700; }

/* category bullets */
.bullet { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
.b-summary { background: var(--section-summary); }
.b-sales { background: var(--section-sales); }
.b-var { background: var(--section-var); }
.b-fix { background: var(--section-fix); }
.b-fin { background: var(--section-fin); }

/* ===== Maintenance grid ===== */
.maint-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 10px;
  margin-top: 12px;
}
.maint-route-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
}
.maint-route-title {
  font-size: 12px; color: var(--text-dim);
  letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 6px;
}
.maint-route-amount {
  font-size: 20px; font-weight: 700;
  font-family: "SF Mono", "Menlo", monospace;
  color: var(--green);
}
.maint-route-count {
  font-size: 11px; color: var(--text-muted);
  margin-top: 4px;
}

.footer {
  margin-top: 48px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text-muted);
  text-align: center;
}
.footer kbd {
  background: var(--bg-card-2);
  border: 1px solid var(--border);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: "SF Mono", "Menlo", monospace;
  font-size: 10px;
}

@media (max-width: 768px) {
  .header h1 { font-size: 20px; }
  .kpi-value { font-size: 20px; }
  table { font-size: 12px; min-width: 900px; }
  thead th.sticky-col { min-width: 160px; }
}
</style>
</head>
<body>

<!-- ============ Lock Screen ============ -->
<div id="lock">
  <div class="lock-card">
    <div class="lock-icon">⛬</div>
    <div class="lock-title">NG FLOW</div>
    <div class="lock-sub">パスワードを入力してください</div>
    <form id="lockForm" autocomplete="off">
      <input type="password" id="passInput" placeholder="••••••••••••••••" autofocus required>
      <button type="submit">ロック解除</button>
    </form>
    <div class="lock-error" id="lockError">パスワードが違います</div>
  </div>
</div>

<!-- ============ Dashboard ============ -->
<div id="dashboard">
  <div class="header">
    <div>
      <h1 id="title"></h1>
      <div class="subtitle" id="subtitle"></div>
    </div>
    <div class="meta">
      <div>最終更新: <span id="genDate"></span></div>
      <div>NAWAGATE株式会社 経営機密</div>
    </div>
  </div>

  <div class="section-title">📊 主要KPI（月末現金残高予測）</div>
  <div class="kpi-grid" id="kpiGrid"></div>

  <div class="section-title">💼 保守管理入金（経路別）</div>
  <div class="maint-grid" id="maintGrid"></div>

  <div class="section-title">📋 項目別 月次明細</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr id="theadRow"></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="footer">
    <div>このダッシュボードは暗号化されており、パスワードを知る人のみが閲覧可能です</div>
    <div style="margin-top:6px;">ブラウザをリロードすると再ロックされます</div>
  </div>
</div>

function b64decode(s) {
  const bin = atob(s);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function deriveKey(password, saltBytes, iterations) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey(
    "raw", enc.encode(password),
    { name: "PBKDF2" }, false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: saltBytes, iterations, hash: "SHA-256" },
    baseKey,
    { name: "AES-GCM", length: 256 },
    false, ["decrypt"]
  );
}

async function tryUnlock(password) {
  const salt = b64decode(ENCRYPTED.salt);
  const iv   = b64decode(ENCRYPTED.iv);
  const ct   = b64decode(ENCRYPTED.ciphertext);
  const key = await deriveKey(password, salt, ENCRYPTED.iterations);
  const plaintext = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  const json = new TextDecoder().decode(plaintext);
  return JSON.parse(json);
}

const lock = document.getElementById("lock");
const lockForm = document.getElementById("lockForm");
const passInput = document.getElementById("passInput");
const lockError = document.getElementById("lockError");
const dashboard = document.getElementById("dashboard");

lockForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  lockError.classList.remove("show");
  const pw = passInput.value;
  try {
    const data = await tryUnlock(pw);
    lock.style.display = "none";
    dashboard.classList.add("ready");
    render(data);
  } catch (err) {
    lockError.classList.add("show");
    passInput.value = "";
    passInput.focus();
  }
});

// ============ レンダリング ============
function fmt(v) {
  if (v == null || v === 0) return "—";
  if (v < 0) return "(¥" + Math.abs(v).toLocaleString() + ")";
  return "¥" + v.toLocaleString();
}
function fmtSigned(v) {
  if (v == null) return "—";
  if (v === 0) return "¥0";
  const sign = v < 0 ? "−" : "";
  return sign + "¥" + Math.abs(v).toLocaleString();
}

function render(d) {
  document.getElementById("title").textContent = d.title;
  document.getElementById("subtitle").textContent = d.subtitle;
  document.getElementById("genDate").textContent = d.generated_at;

  // KPI cards: 各月の月末残高
  const kpiGrid = document.getElementById("kpiGrid");
  d.monthly_kpi.forEach((k, idx) => {
    const card = document.createElement("div");
    card.className = "kpi-card";
    const isPositive = k.closing > 0;
    const cls = isPositive ? "positive" : "negative";
    card.innerHTML = `
      <div class="kpi-label">${k.month} 月末</div>
      <div class="kpi-value ${cls}">${fmtSigned(k.closing)}</div>
      <div class="kpi-note">収支: ${fmtSigned(k.sales - k.var - k.fix - k.fin)}</div>
    `;
    kpiGrid.appendChild(card);
  });

  // 保守管理: 経路別集計
  const maintGrid = document.getElementById("maintGrid");
  const routes = { "K-NET": [], "銀行": [], "カード": [], "未設定": [] };
  d.maintenance.forEach(m => {
    const r = m.route || "未設定";
    if (routes[r]) routes[r].push(m); else routes["未設定"].push(m);
  });
  Object.entries(routes).forEach(([route, list]) => {
    const total = list.reduce((s, m) => s + m.monthly, 0);
    const card = document.createElement("div");
    card.className = "maint-route-card";
    card.innerHTML = `
      <div class="maint-route-title">${route}</div>
      <div class="maint-route-amount">${fmt(total)}/月</div>
      <div class="maint-route-count">${list.length}件 / 年計 ${fmt(total * 12)}</div>
    `;
    maintGrid.appendChild(card);
  });

  // ============ Detail Table ============
  const theadRow = document.getElementById("theadRow");
  theadRow.innerHTML = `<th class="sticky-col">項目</th>` +
    d.months.map((m, i) => `<th class="${i===0?'col-month-april':''}">${m}</th>`).join("") +
    `<th class="col-year">年計</th><th>2025参考</th>`;

  const tbody = document.getElementById("tbody");
  // section別にレンダリング
  const bulletClass = {
    "サマリー": "b-summary", "売上": "b-sales", "変動費": "b-var",
    "固定費": "b-fix", "財務": "b-fin"
  };
  const subtotalNames = new Set(["売上合計","変動費合計","固定費合計","財務支出合計"]);
  const summaryNames = new Set(["月初現金残高","月末現金残高（予測）"]);

  d.section_order.forEach(([secName, items]) => {
    // section header row
    const headerTr = document.createElement("tr");
    headerTr.className = "section-row";
    headerTr.innerHTML = `<td colspan="${d.months.length + 3}"><span class="bullet ${bulletClass[secName]}"></span>${secName}</td>`;
    tbody.appendChild(headerTr);

    items.forEach(itemName => {
      const row = d.rows.find(r => r.item === itemName);
      if (!row) return;
      const tr = document.createElement("tr");
      if (subtotalNames.has(itemName)) tr.className = "subtotal";
      if (summaryNames.has(itemName)) tr.className = "summary";

      const yearly = row.values.reduce((s, v) => s + (v || 0), 0);
      const cells = [
        `<td class="label">${itemName}</td>`,
        ...row.values.map((v, i) => {
          let cls = "";
          if (i === 0) cls += " april";
          if (v === 0 || v == null) cls += " zero";
          if (v != null && v < 0) cls += " negative";
          // 5月の確定支出ハイライト
          if (i === 1 && (itemName === "消費税" || itemName === "法人県税" || itemName === "法人市税")) {
            cls += " prefilled";
          }
          return `<td class="${cls.trim()}">${fmt(v)}</td>`;
        }),
        `<td class="year-total">${fmt(yearly)}</td>`,
        `<td class="ref2025">${row.ref2025 ? fmt(row.ref2025) : "—"}</td>`,
      ];
      tr.innerHTML = cells.join("");
      tbody.appendChild(tr);
    });
  });
}
</script>
